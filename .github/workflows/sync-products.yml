import fs from 'fs'
import path from 'path'
import { fileURLToPath } from 'url'

// ===== 保持你原有的 import，不动 =====
import {
  fetchCsv,
  parseCsv,
  generateOgImage,
  generateProductPage
} from './lib.js'
// ====================================

const __filename = fileURLToPath(import.meta.url)
const __dirname = path.dirname(__filename)

const SITE_DIR = process.cwd()
const PRODUCTS_JSON = path.join(SITE_DIR, 'products.json')
const ARCHIVE_JSON = path.join(SITE_DIR, 'archive.json')
const PAGES_DIR = path.join(SITE_DIR, 'p')

/* =========================================================
 * 【新增】读取旧 products.json，用于判断“是否新增产品”
 * ========================================================= */
const existingAsinSet = new Set()

if (fs.existsSync(PRODUCTS_JSON)) {
  try {
    const oldProducts = JSON.parse(
      fs.readFileSync(PRODUCTS_JSON, 'utf-8')
    )
    for (const p of oldProducts) {
      if (p && p.asin) {
        existingAsinSet.add(p.asin)
      }
    }
    console.log(`[diff] loaded ${existingAsinSet.size} existing ASINs`)
  } catch (e) {
    console.warn('[diff] failed to read old products.json, treat all as new')
  }
} else {
  console.log('[diff] first run, no existing products.json')
}

/* =========================================================
 * 1. 拉取 CSV（原有逻辑，不动）
 * ========================================================= */
console.log('[sync] fetching CSV...')
const csvText = await fetchCsv()
console.log(`[sync] CSV bytes = ${csvText.length}`)

const products = parseCsv(csvText)
console.log(`[sync] parsed products = ${products.length}`)

/* =========================================================
 * 2. 写 products.json（原有逻辑，不动）
 * ========================================================= */
fs.writeFileSync(
  PRODUCTS_JSON,
  JSON.stringify(products, null, 2)
)
console.log('[sync] products.json updated')

/* =========================================================
 * 3. 写 archive.json（原有逻辑，不动）
 * ========================================================= */
let archive = []

if (fs.existsSync(ARCHIVE_JSON)) {
  try {
    archive = JSON.parse(fs.readFileSync(ARCHIVE_JSON, 'utf-8'))
  } catch {}
}

const archiveMap = new Map(archive.map(p => [p.asin, p]))
for (const p of products) {
  if (p && p.asin) {
    archiveMap.set(p.asin, p)
  }
}

archive = Array.from(archiveMap.values())

fs.writeFileSync(
  ARCHIVE_JSON,
  JSON.stringify(archive, null, 2)
)
console.log('[sync] archive.json updated')

/* =========================================================
 * 4. 只对【新增产品】生成 OG / 页面（唯一行为修改点）
 * ========================================================= */
if (!fs.existsSync(PAGES_DIR)) {
  fs.mkdirSync(PAGES_DIR, { recursive: true })
}

let newCount = 0
let skipCount = 0

for (const product of products) {
  const asin = product?.asin
  if (!asin) continue

  // 🔑 关键判断：是否新增
  const isNewProduct = !existingAsinSet.has(asin)

  if (!isNewProduct) {
    console.log(`[skip] ${asin} already exists`)
    skipCount++
    continue
  }

  console.log(`[new] ${asin} generate OG / page`)
  newCount++

  try {
    await generateOgImage(product)
    await generateProductPage(product)
  } catch (err) {
    console.error(`[error] ${asin}`, err?.message || err)
  }
}

console.log('--------------------------------')
console.log(`[result] new products : ${newCount}`)
console.log(`[result] skipped      : ${skipCount}`)
console.log('--------------------------------')
