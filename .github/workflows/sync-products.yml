import fs from "fs"
import path from "path"
import crypto from "crypto"
import { fileURLToPath } from "url"

const __filename = fileURLToPath(import.meta.url)
const __dirname = path.dirname(__filename)

const ROOT = path.resolve(__dirname, "..")

const PRODUCTS_JSON = path.join(ROOT, "products.json")
const ARCHIVE_JSON = path.join(ROOT, "archive.json")
const OUT_DIR = path.join(ROOT, process.env.OUT_DIR || "p")
const HASH_FILE = path.join(ROOT, ".sync_hash")

const CSV_URL = process.env.CSV_URL
const SITE_ORIGIN = process.env.SITE_ORIGIN || ""

function sha256(text) {
  return crypto.createHash("sha256").update(text).digest("hex")
}

async function fetchText(url) {
  const res = await fetch(url)
  if (!res.ok) throw new Error("CSV fetch failed")
  return await res.text()
}

function ensureDir(dir) {
  if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true })
}

function parseCSV(csvText) {
  const lines = csvText.split(/\r?\n/).filter(Boolean)
  const headers = lines[0].split(",").map(s => s.trim())

  return lines.slice(1).map(line => {
    const cols = line.split(",")
    const obj = {}
    headers.forEach((h, i) => obj[h] = (cols[i] || "").trim())
    return obj
  })
}

/**
 * 🚨 MOCK OG函数（替换你真实OG逻辑）
 * 如果你有真实OG API，就放这里
 */
async function generateOG(asin) {
  // 模拟：真实环境这里是 API 请求
  // 这里统一兜底，不阻塞
  return `https://placeholder.image/${asin}`
}

/**
 * ⭐ 核心优化：失败立即返回，不阻塞
 */
async function safeOG(asin) {
  try {
    return await generateOG(asin)
  } catch (e) {
    return "placeholder"
  }
}

async function main() {
  console.log("[sync] start")

  if (!CSV_URL) throw new Error("CSV_URL missing")

  const csvText = await fetchText(CSV_URL)

  const hash = sha256(csvText)

  if (fs.existsSync(HASH_FILE)) {
    const last = fs.readFileSync(HASH_FILE, "utf8").trim()
    if (last === hash) {
      console.log("[sync] no change, exit fast")
      process.exit(0)
    }
  }

  const records = parseCSV(csvText)

  console.log("[sync] records:", records.length)

  /**
   * 🚀 关键优化点：OG 并发，不再串行
   */
  const products = await Promise.all(
    records.map(async (r, i) => {
      const asin = r.asin || ""

      const og = await safeOG(asin)

      return {
        id: r.id || String(i + 1),
        title: r.title || r.name || "",
        asin,
        price: r.price || "",
        og, // 👈 已优化：不会卡
        updatedAt: new Date().toISOString()
      }
    })
  )

  console.log("[sync] og done")

  fs.writeFileSync(PRODUCTS_JSON, JSON.stringify(products, null, 2))
  fs.writeFileSync(ARCHIVE_JSON, JSON.stringify(products, null, 2))

  ensureDir(OUT_DIR)

  /**
   * 🚀 页面生成（同步，但已经不慢了）
   */
  for (const p of products) {
    const html = `<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>${p.title}</title>
</head>
<body>
<h1>${p.title}</h1>
<p>ASIN: ${p.asin}</p>
<p>Price: ${p.price}</p>
<img src="${p.og}" />
</body>
</html>`

    fs.writeFileSync(path.join(OUT_DIR, `${p.id}.html`), html)
  }

  fs.writeFileSync(HASH_FILE, hash)

  console.log("[sync] done")
}

main().catch(e => {
  console.error(e)
  process.exit(1)
})
