import fs from 'fs'
import path from 'path'
import { fileURLToPath } from 'url'

import {
  fetchCsv,
  parseCsv,
  generateOgImage,
  generateProductPage
} from './lib.js'   // ← 保持你原来的 import，不要乱改

const __filename = fileURLToPath(import.meta.url)
const __dirname = path.dirname(__filename)

const SITE_DIR = process.cwd()
const PRODUCTS_JSON_PATH = path.join(SITE_DIR, 'products.json')
const ARCHIVE_JSON_PATH = path.join(SITE_DIR, 'archive.json')
const PAGES_DIR = path.join(SITE_DIR, 'p')

// ==============================
// 1. 读取旧 products.json（用于 diff）
// ==============================
const oldProductsMap = new Map()

if (fs.existsSync(PRODUCTS_JSON_PATH)) {
  try {
    const oldProducts = JSON.parse(
      fs.readFileSync(PRODUCTS_JSON_PATH, 'utf-8')
    )
    for (const p of oldProducts) {
      if (p.asin) {
        oldProductsMap.set(p.asin, true)
      }
    }
    console.log(`[diff] loaded ${oldProductsMap.size} existing products`)
  } catch (e) {
    console.warn('[diff] failed to read old products.json, treat all as new')
  }
} else {
  console.log('[diff] no existing products.json, first run')
}

// ==============================
// 2. 拉取 CSV 并生成 products
// ==============================
console.log('[sync] fetching csv...')
const csvText = await fetchCsv()
console.log(`[sync] csv bytes = ${csvText.length}`)

const products = parseCsv(csvText)
console.log(`[sync] parsed products = ${products.length}`)

// ==============================
// 3. 写入新的 products.json / archive.json
// ==============================
fs.writeFileSync(
  PRODUCTS_JSON_PATH,
  JSON.stringify(products, null, 2)
)
console.log(`[sync] wrote products.json (${products.length})`)

let archive = []
if (fs.existsSync(ARCHIVE_JSON_PATH)) {
  try {
    archive = JSON.parse(fs.readFileSync(ARCHIVE_JSON_PATH, 'utf-8'))
  } catch {}
}

const archiveMap = new Map(archive.map(p => [p.asin, p]))
for (const p of products) {
  archiveMap.set(p.asin, p)
}

archive = Array.from(archiveMap.values())

fs.writeFileSync(
  ARCHIVE_JSON_PATH,
  JSON.stringify(archive, null, 2)
)
console.log(`[sync] wrote archive.json (${archive.length})`)

// ==============================
// 4. 只对“新增产品”生成 OG / 页面
// ==============================
if (!fs.existsSync(PAGES_DIR)) {
  fs.mkdirSync(PAGES_DIR, { recursive: true })
}

let newCount = 0
let skipCount = 0

for (const product of products) {
  const asin = product.asin

  if (!asin) continue

  const isNew = !oldProductsMap.has(asin)

  if (!isNew) {
    console.log(`[skip] ${asin} already exists`)
    skipCount++
    continue
  }

  console.log(`[new] ${asin} generate OG / page`)
  newCount++

  try {
    await generateOgImage(product)
    await generateProductPage(product)
  } catch (err) {
    console.error(`[error] ${asin}`, err.message)
  }
}

console.log('==============================')
console.log(`[result] new products  : ${newCount}`)
console.log(`[result] skipped       : ${skipCount}`)
console.log('==============================')
